<!doctype html>
<html data-bs-theme="dark">
    <head>
    <title>My Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Simple Note</h1>
            <button id="theme-toggle" class="btn btn-outline-secondary btn-sm" onclick="toggleTheme()">
                <span id="theme-icon">&#9788;</span> Light Mode
            </button>
        </div>
        <form action="/" method="POST">
     <textarea name="note" class="form-control" placeholder="Write a note..."></textarea>
     <br>
     <button name="action" value="save" class="btn me-2">Save</button>
     <button name="action" value="delete" class="btn">Delete All</button>
    </form>
    <div class="notes-grid">
        {% for note in notes %}
            <div class="note-card">
                <p class="note-text">{{ note[1] }}</p>
                <span class="note-date">{{ note[2] or "" }}</span>
            </div>
        {% endfor %}
    </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('theme-toggle');
            const icon = document.getElementById('theme-icon');
            if (html.getAttribute('data-bs-theme') === 'dark') {
                html.setAttribute('data-bs-theme', 'light');
                btn.innerHTML = '<span id="theme-icon">&#9790;</span> Dark Mode';
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-bs-theme', 'dark');
                btn.innerHTML = '<span id="theme-icon">&#9788;</span> Light Mode';
                localStorage.setItem('theme', 'dark');
            }
        }

        // Restore saved theme
        (function() {
            const saved = localStorage.getItem('theme');
            if (saved === 'light') {
                document.documentElement.setAttribute('data-bs-theme', 'light');
                document.addEventListener('DOMContentLoaded', function() {
                    document.getElementById('theme-toggle').innerHTML = '<span id="theme-icon">&#9790;</span> Dark Mode';
                });
            }
        })();
    </script>
</body>
</html>
